<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Strokes Countdown</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;
  background:black;
  opacity:0;
  transition:opacity 2.5s ease;
}

/* 🎬 FONDO CONCIERTO */
.bg{
  position:fixed;
  inset:0;
  background:
    linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.65)),
    url('bg.jpg') center/cover no-repeat;
  z-index:-3;
  transform:scale(1.05);
  animation:zoom 6s ease forwards;
}

.bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6));
}

/* 🎥 EFECTO CINE */
@keyframes zoom{
  from{transform:scale(1.15)}
  to{transform:scale(1.05)}
}

/* ✨ LUCES */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,150,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 40%, rgba(255,255,255,0.1), transparent 40%);
  animation:lights 6s infinite alternate;
  pointer-events:none;
}

@keyframes lights{
  from{transform:translateY(-20px)}
  to{transform:translateY(20px)}
}

.container{
  padding:20px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.logo{
  width:200px;
  margin:0 auto 15px;
  border-radius:10px;
  filter:drop-shadow(0 0 20px rgba(0,150,255,0.5));
}

h1{
  font-size:28px;
  margin-bottom:5px;
}

.subtitle{
  opacity:0.85;
  margin-bottom:20px;
}

.countdown{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:25px;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

.number{
  font-size:26px;
  font-weight:bold;
}

.message{
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:20px;
}

.button{
  margin-top:25px;
  padding:12px 20px;
  border-radius:30px;
  background:white;
  color:black;
  text-decoration:none;
  font-weight:bold;
  display:inline-block;
}

/* 💌 MENSAJE OCULTO */
.secret{
  margin-top:20px;
  cursor:pointer;
}

.secret-text{
  display:none;
  margin-top:10px;
}

.secret.show .secret-text{
  display:block;
}

/* ✨ PARTÍCULAS */
.spark{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  background:white;
  pointer-events:none;
  animation:fly .8s forwards;
}

@keyframes fly{
  to{
    opacity:0;
    transform:translate(var(--x), var(--y));
  }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
  <p>20 OCTUBRE · BARCELONA</p>

  <img src="logo.jpg" class="logo">

  <!-- 💎 OPCIONAL (TOP) -->
  <h1>Silvia García Ezquerra,</h1>
  <p class="subtitle">
    esto no es solo un concierto…<br>
    es TU noche ❤️
  </p>

  <div id="countdown" class="countdown"></div>

  <div id="message" class="message"></div>

  <a class="button" target="_blank"
  href="https://open.spotify.com/artist/0epOFNiUfyON9EYx7Tpr6V">
  🎵 Escuchar antes del concierto
  </a>

  <div class="secret" id="secret">
    <p>💌 Toca aquí</p>
    <div class="secret-text">
      Este momento va a ser inolvidable.<br>
      Y esto es solo el principio ✨
    </div>
  </div>

</div>

<script>
const concertDate = new Date("2026-10-20T20:00:00");

function updateCountdown(){
  const now = new Date();
  const diff = concertDate - now;

  const container = document.getElementById("countdown");
  const message = document.getElementById("message");

  if(diff <= 0){
    container.innerHTML = "<h2>HOY ES EL DÍA 🔥</h2>";
    message.innerHTML = "Disfruta cada segundo. Esta noche es tuya.";
    return;
  }

  const sec = Math.floor(diff/1000);
  const d = Math.floor(sec/86400);
  const h = Math.floor((sec%86400)/3600);
  const m = Math.floor((sec%3600)/60);
  const s = sec%60;

  container.innerHTML = `
    <div class="box"><div class="number">${d}</div><div>días</div></div>
    <div class="box"><div class="number">${h}</div><div>h</div></div>
    <div class="box"><div class="number">${m}</div><div>m</div></div>
    <div class="box"><div class="number">${s}</div><div>s</div></div>
  `;

  message.innerHTML = `
    Silvia, te quedan <b>${d} días</b>, ${h}h ${m}m ${s}s<br>
    para ver a <b>The Strokes</b> en Barcelona.<br><br>
    Ve preparando la voz… 🔥
  `;
}

setInterval(updateCountdown,1000);
updateCountdown();

/* 🎬 FADE IN */
window.onload = () => {
  setTimeout(()=> document.body.style.opacity = 1, 500);
};

/* 💌 SECRETO */
const secret = document.getElementById("secret");
secret.onclick = () => secret.classList.toggle("show");

/* ✨ PARTÍCULAS */
document.addEventListener("click", e=>{
  for(let i=0;i<10;i++){
    const s=document.createElement("span");
    s.className="spark";
    s.style.left=e.clientX+"px";
    s.style.top=e.clientY+"px";
    s.style.setProperty("--x",(Math.random()*100-50)+"px");
    s.style.setProperty("--y",(Math.random()*-100)+"px");
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),800);
  }
});
</script>

</body>
</html>

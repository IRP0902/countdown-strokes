<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Strokes Countdown</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: black;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1518972559570-7cc1309f3229?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
      filter: brightness(0.4);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      z-index: -1;
    }

    .container {
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    .number {
      font-size: 2em;
      font-weight: bold;
    }

    .message {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 20px;
      margin-top: 20px;
    }

    .button {
      margin-top: 30px;
      padding: 12px 20px;
      border-radius: 30px;
      background: white;
      color: black;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
    }

    .small {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>

</head>

<body>
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="container">
    <p>20 OCT · BARCELONA</p>
    <h1>The Strokes</h1>
    <p class="subtitle">Lucía, tu noche se acerca ✨</p>

```
<div id="countdown" class="countdown"></div>

<div class="message" id="message"></div>

<a class="button" target="_blank"
  href="https://open.spotify.com/artist/0epOFNiUfyON9EYx7Tpr6V">
  🎵 Escuchar antes del concierto
</a>

<p class="small">Comparte este link y guarda el momento 💌</p>
```

  </div>

  <script>
    const concertDate = new Date("2026-10-20T20:00:00");

    function updateCountdown() {
      const now = new Date();
      const diff = concertDate - now;

      const container = document.getElementById("countdown");
      const message = document.getElementById("message");

      if (diff <= 0) {
        container.innerHTML = "<h2>HOY ES EL DÍA 🔥</h2>";
        message.innerHTML = "Lucía, disfruta cada segundo. Esta noche es tuya.";
        return;
      }

      const minutes = Math.floor(diff / 1000 / 60);
      const days = Math.floor(minutes / (60 * 24));
      const hours = Math.floor((minutes % (60 * 24)) / 60);
      const mins = minutes % 60;

      container.innerHTML = `
        <div class="box"><div class="number">${days}</div><div>días</div></div>
        <div class="box"><div class="number">${hours}</div><div>horas</div></div>
        <div class="box"><div class="number">${mins}</div><div>min</div></div>
      `;

      message.innerHTML = `
        Lucía, te quedan <b>${days} días</b>, 
        <b>${hours} horas</b> y 
        <b>${mins} minutos</b><br>
        para ver a <b>The Strokes</b> en <b>Barcelona</b>.<br><br>
        Palau Sant Jordi · 20:00
      `;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Strokes · Cuenta atrás</title>

<style>
:root{
  --blue:#1e8fff;
  --card:rgba(7,12,24,.65);
  --line:rgba(113,170,255,.18);
  --text:#f4f8ff;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  font-family:Arial, sans-serif;
  color:var(--text);
  background:#020611;
}

/* 🔥 FONDO DEFINITIVO */
.background{
  position:fixed;
  inset:0;
  z-index:0;
}

.background img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom, rgba(0,0,0,.2), rgba(0,0,0,.5)),
    radial-gradient(circle at center, transparent 40%, rgba(0,0,0,.3));
}

/* CONTENIDO */
.wrap{
  position:relative;
  z-index:1;
  max-width:520px;
  margin:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  text-align:center;
}

/* HEADER */
.topline{
  font-size:10px;
  letter-spacing:.2em;
}

.hero h1{
  margin:0;
  font-size:clamp(26px,7vw,42px);
}

.hero p{
  margin:4px 0;
}

.accent{color:var(--blue)}

.pill{
  display:inline-block;
  margin-top:6px;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(0,0,0,.5);
  font-size:11px;
}

/* CONTADOR */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:10px;
}

.countdown{
  display:grid;
  grid-template-columns:repeat(4,1fr);
}

.num{
  font-size:28px;
  font-weight:800;
}

.label{
  font-size:9px;
  color:var(--blue);
}

/* PREP */
.prep{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  font-size:10px;
}

.prep div{
  padding:6px;
}

/* DETAILS */
.details{
  display:grid;
  grid-template-columns:1fr 1fr;
  font-size:12px;
}

.details div{
  padding:8px;
}

/* BOTONES */
.cta{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.btn{
  padding:10px;
  border-radius:12px;
  font-size:10px;
}

.blue{
  background:#1e8fff;
}

.dark{
  background:#111;
}

/* FOOTER */
.footer{
  font-size:12px;
  opacity:.9;
}

/* MOBILE EXTRA */
@media(max-width:360px){
  .num{font-size:22px}
  .btn{font-size:9px}
}
</style>
</head>

<body>

<!-- 🔥 FONDO -->
<div class="background">
  <img src="https://irp0902.github.io/countdown-strokes/bg.jpg?v=3">
  <div class="overlay"></div>
</div>

<div class="wrap">

<div class="topline">20 OCTUBRE • BARCELONA</div>

<div class="hero">
  <h1>Silvia García Ezquerra,</h1>
  <p>esto no es solo un concierto...</p>
  <p>es <span class="accent">TU noche</span> 💗</p>
  <div class="pill">📍 Palau Sant Jordi • 20:00</div>
</div>

<div class="card">
  <p style="font-size:10px;letter-spacing:.2em">TE QUEDAN</p>
  <div id="countdown" class="countdown"></div>
</div>

<div class="card">
  <div class="prep">
    <div>🎤<br>voz</div>
    <div>👕<br>outfit</div>
    <div>⚡<br>ganas</div>
  </div>
  <p style="margin-top:6px">esa noche promete ser brutal 💙</p>
</div>

<div class="card details">
  <div>
    <b>Palau Sant Jordi</b><br>Barcelona
  </div>
  <div>
    <b>20 octubre</b><br>20:00
  </div>
</div>

<div class="cta">
  <a class="btn blue" href="https://open.spotify.com/artist/0epOFNiUfyON9EYx7Tpr6V">🎵 escuchar</a>
  <button class="btn dark">🎁 sorpresa</button>
</div>

<div class="footer">✨ La noche empieza aquí 💗</div>

</div>

<script>
const target=new Date("2026-10-20T20:00:00");
const el=document.getElementById("countdown");

function pad(n){return n.toString().padStart(2,"0");}

function update(){
  const now=new Date();
  const diff=target-now;

  if(diff<=0){
    el.innerHTML="<div class='num'>HOY 🔥</div>";
    return;
  }

  const s=Math.floor(diff/1000);
  const d=Math.floor(s/86400);
  const h=Math.floor((s%86400)/3600);
  const m=Math.floor((s%3600)/60);
  const sec=s%60;

  el.innerHTML=`
    <div><div class="num">${d}</div><div class="label">días</div></div>
    <div><div class="num">${pad(h)}</div><div class="label">h</div></div>
    <div><div class="num">${pad(m)}</div><div class="label">m</div></div>
    <div><div class="num">${pad(sec)}</div><div class="label">s</div></div>
  `;
}

update();
setInterval(update,1000);
</script>

</body>
</html>
